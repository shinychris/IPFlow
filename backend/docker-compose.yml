# ==========================================
# IPFlow 开发环境 Docker Compose
# ==========================================

version: '3.8'

services:
  # FastAPI 应用
  app:
    build:
      context: .
      target: development
    container_name: ipflow-app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ipflow
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LOG_LEVEL=DEBUG
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - ipflow-network
    command: uvicorn src.ipflow.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: .
      target: development
    container_name: ipflow-worker
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-not-for-production
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ipflow
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
    depends_on:
      - db
      - redis
    networks:
      - ipflow-network
    command: celery -A src.ipflow.tasks.celery_app worker --loglevel=info --concurrency=2

  # Celery Beat (定时任务)
  beat:
    build:
      context: .
      target: development
    container_name: ipflow-beat
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    networks:
      - ipflow-network
    command: celery -A src.ipflow.tasks.celery_app beat --loglevel=info

  # PostgreSQL 数据库
  db:
    image: postgres:18-alpine
    container_name: ipflow-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ipflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ipflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ipflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ipflow-network
    command: redis-server --appendonly yes

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: ipflow-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - ipflow-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO 初始化 (创建 bucket)
  minio-init:
    image: minio/mc:latest
    container_name: ipflow-minio-init
    depends_on:
      - minio
    networks:
      - ipflow-network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/ipflow || true;
      /usr/bin/mc policy set public myminio/ipflow/public || true;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ipflow-network:
    driver: bridge
