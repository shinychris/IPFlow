# Alembic 配置文件
# 文档: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# 脚本目录
script_location = alembic

# 模板文件
template_dir = alembic/templates

# 数据库 URL（从环境变量读取）
# 格式: postgresql://user:password@host:port/dbname
prepend_sys_path = .

# 版本控制表名
version_table = alembic_version

# 输出编码
output_encoding = utf-8

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
